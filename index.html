<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>SRM TRP GPA/CGPA Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>SRM TRP GPA/CGPA Calculator</h1>
    <div class="theme-switcher">
      <button onclick="setTheme('light')">Light Theme</button>
      <button onclick="setTheme('multicolor')">Multicolor Theme</button>
    </div>
    <div class="calculator">
      <div class="grades-info">
        <h2>Grading System</h2>
        <table>
          <tr>
            <th>Grade</th>
            <th>Description</th>
            <th>Grade Points</th>
          </tr>
          <tr>
            <td>O</td>
            <td>Outstanding</td>
            <td>10</td>
          </tr>
          <tr>
            <td>A+</td>
            <td>Excellent</td>
            <td>9</td>
          </tr>
          <tr>
            <td>A</td>
            <td>Very Good</td>
            <td>8</td>
          </tr>
          <tr>
            <td>B+</td>
            <td>Good</td>
            <td>7</td>
          </tr>
          <tr>
            <td>B</td>
            <td>Average</td>
            <td>6</td>
          </tr>
          <tr>
            <td>C</td>
            <td>Satisfactory</td>
            <td>5</td>
          </tr>
        </table>
      </div>
      <div class="gpa-calculator">
        <h2>GPA Calculator</h2>
        <div id="gpa-inputs">
          <div class="subject">
            <input type="text" placeholder="Subject Name" class="subject-name">
            <select class="grade">
              <option value="10">O</option>
              <option value="9">A+</option>
              <option value="8">A</option>
              <option value="7">B+</option>
              <option value="6">B</option>
              <option value="5">C</option>
            </select>
            <input type="number" placeholder="Credits" class="credits" min="1">
          </div>
        </div>
        <button onclick="addSubject()">Add Subject</button>
        <button onclick="calculateGPA()">Calculate GPA</button>
        <p id="gpa-result"></p>
      </div>
      <div class="cgpa-calculator">
        <h2>CGPA Calculator</h2>
        <div id="cgpa-inputs">
          <input type="number" placeholder="Total Credits" id="total-credits">
          <input type="number" placeholder="Total Grade Points" id="total-grade-points">
        </div>
        <button onclick="calculateCGPA()">Calculate CGPA</button>
        <p id="cgpa-result"></p>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
